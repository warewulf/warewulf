---
name: testsuite

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - 'v4.*.x'
    paths-ignore:
      - 'docs/**'

jobs:
  testsuite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - name: Checkout Warewulf
        uses: actions/checkout@v4
      - name: Install gpgme (dependency)
        run: |
          sudo apt update \
          && sudo apt-get install libgpgme-dev
        shell: bash
      - name: Setup go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Prepare Warewulf
        shell: bash
        run: |
          make config
          make vendor
      - name: Check for out-of-date license information
        run: make LICENSE_DEPENDENCIES.md && git diff --quiet LICENSE_DEPENDENCIES.md
      - name: Check Warewulf code with golang linter (golang ${{ matrix.go-version }})
        run: make lint
      - name: Check Warewulf code with staticcheck (golang ${{ matrix.go-version }})
        run: make staticcheck
      - name: Vet Warewulf code (golang ${{ matrix.go-version }})
        run: make vet
      - name: Check Warewulf code for formatting (golang ${{ matrix.go-version }})
        run: |
          make -s fmt | tee /tmp/fmt-output
          test "$(wc -l </tmp/fmt-output)" == 0
      - name: Check for dead Warewulf code (golang ${{ matrix.go-version }})
        run: make deadcode
      - name: Run the test suite (golang ${{ matrix.go-version }})
        run: make test
      - name: Build Warewulf (golang ${{ matrix.go-version }})
        run: make all
      - name: Build the Docker image
        run: docker build . --file Dockerfile

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Warewulf
        uses: actions/checkout@v4
      # /opt and /home are bind-mounted from the host because
      # overlayfs does not support NFS exporting.
      - name: Start Rocky Linux 10 container
        run: >-
          sudo podman run
          -w /home/warewulf
          --privileged
          -v /home:/home
          -v /opt:/opt
          -v ${{ github.workspace }}:/home/warewulf
          -d
          --systemd=true
          --hostname sms
          rockylinux/rockylinux:10-ubi-init
          /usr/lib/systemd/systemd
      - name: Run integration test
        run: sudo podman exec -it -l bash -c "cd /home/warewulf; bash scripts/integration-test-el.sh"
