nodes:
  node1:
    disks:
      /dev/vda:
        wipe_table: true
        partitions:
          scratch:
            should_exist: true
          swap:
            number: "1"
            size_mib: "1024"
    filesystems:
      /dev/disk/by-partlabel/scratch:
        format: btrfs
        path: /scratch
        wipe_filesystem: true
      /dev/disk/by-partlabel/swap:
        format: swap
        path: swap
  node2:
    resources:
      ignition:
        storage:
          disks:
            - device: /dev/vda
              partitions:
                - label: rootfs
                  number: 1
                  shouldExist: true
                  wipePartitionEntry: false
              wipeTable: true
          filesystems:
            - device: /dev/disk/by-partlabel/rootfs
              format: ext4
              path: /
              wipeFilesystem: false
