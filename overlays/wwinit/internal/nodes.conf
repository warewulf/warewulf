nodes:
  node1:
    init: /sbin/init
    root: initramfs
    ipxe template: default
    image name: rockylinux-9
    ipmi:
      username: user
      password: password
      ipaddr: 192.168.4.21
      netmask: 255.255.255.0
      gateway: 192.168.4.1
      write: true
      tags:
        bit-rate: "115.2"
    filesystems:
      /dev/sda1:
        format: ext4
        path: /mnt/foo
      /dev/sda2:
        format: ext4
        path: /
      /dev/sda3:
        format: swap
        path: swap
  node2:
    init: /sbin/init
    root: initramfs
    ipxe template: default
    image name: rockylinux-9
    resources:
      ignition:
        storage:
          filesystems:
            - device: /dev/sdb1
              format: ext4
              path: /mnt/bar
            - device: /dev/sdb2
              format: ext4
              path: /
            - device: /dev/sdb3
              format: swap
              path: swap
